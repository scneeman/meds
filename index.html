<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medication Safety Checker</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: #f7f9fa;
            color: #333;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 12px 20px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-blue { background-color: #007bff; color: white; }
        .btn-blue:hover { background-color: #0056b3; }
        .btn-orange { background-color: #fd7e14; color: white; }
        .btn-orange:hover { background-color: #d9660c; }
        .btn-search { background-color: #6f42c1; color: white; margin-top: 10px; padding: 8px 14px; font-size: 13px;}
        .btn-search:hover { background-color: #563d7c; }
        
        .med-list {
            background: #e9ecef;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 25px;
        }
        .med-badge {
            display: inline-block;
            background: white;
            padding: 5px 10px;
            border-radius: 20px;
            margin: 4px;
            font-size: 14px;
            border: 1px solid #cbd5e1;
        }
        .results-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 6px;
            background: #fff;
            border-left: 5px solid #6c757d;
            display: none;
            white-space: pre-line;
            line-height: 1.6;
        }
        .loading { color: #666; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h2>Medication Safety Portal</h2>
    
    <div class="med-list">
        <strong>Medications:</strong>
        <div id="current-meds-container" style="margin-top: 8px;"></div>
    </div>

    <div class="input-group">
        <input type="text" id="med-input" placeholder="Enter medication name (e.g., Tylenol, Scopolamine, Ibuprofen)...">
    </div>
    
    <div>
        <button class="btn-blue" onclick="checkSideEffects()">Show Known Side Effects</button>
        <button class="btn-orange" onclick="checkInteractions()">Check Interactions</button>
    </div>

    <div id="results" class="results-box"></div>
</div>

<script>
    const currentMedications = [
        "remicade", "gabapentin", "nortriptyline", "magnesium", 
        "omega 3 fish oil", "folic acid", "methotrexate", "melatonin"
    ];

    document.getElementById('current-meds-container').innerHTML = currentMedications
        .map(med => `<span class="med-badge">${med.charAt(0).toUpperCase() + med.slice(1)}</span>`)
        .join('');

    const resultsDiv = document.getElementById('results');

    // Helper: Normalize user text into a strict active ingredient string via NIH RxNorm
    async function getNormalizedDrugName(inputName) {
        if (!inputName.trim()) return null;
        try {
            const approxResponse = await fetch(`https://rxnav.nlm.nih.gov/REST/approximateTerm.json?term=${encodeURIComponent(inputName)}&maxEntries=1`);
            const approxData = await approxResponse.json();
            
            if (approxData.approximateGroup && approxData.approximateGroup.candidate && approxData.approximateGroup.candidate.length > 0) {
                const rxcui = approxData.approximateGroup.candidate[0].rxcui;
                
                const ingredientResponse = await fetch(`https://rxnav.nlm.nih.gov/REST/rxcui/${rxcui}/related.json?tty=ING`);
                const ingredientData = await ingredientResponse.json();
                
                if (ingredientData.relatedGroup && ingredientData.relatedGroup.conceptGroup) {
                    const group = ingredientData.relatedGroup.conceptGroup.find(g => g.tty === 'ING');
                    if (group && group.conceptProperties && group.conceptProperties.length > 0) {
                        return group.conceptProperties[0].name.toLowerCase();
                    }
                }
                
                let fallbackName = approxData.approximateGroup.candidate[0].name;
                return fallbackName ? fallbackName.split(' ')[0].toLowerCase() : null;
            }
            return null; 
        } catch (error) {
            console.error("NIH API error", error);
            return null; 
        }
    }

    // BUTTON 1: Fetch Side Effects
    async function checkSideEffects() {
        const rawInput = document.getElementById('med-input').value;
        if (!rawInput) return alert("Please enter a medication name first.");
        
        showLoading();
        let cleanName = await getNormalizedDrugName(rawInput);
        const searchWord = cleanName || rawInput.trim().toLowerCase();

        try {
            let url = `https://api.fda.gov/drug/event.json?search=patient.drug.medicinalproduct:"${encodeURIComponent(searchWord)}"&count=patient.reaction.reactionmeddrapt.exact&limit=15`;
            let response = await fetch(url);
            let data = await response.json();
            
            if (data.error) {
                url = `https://api.fda.gov/drug/event.json?search="${encodeURIComponent(searchWord)}"&count=patient.reaction.reactionmeddrapt.exact&limit=15`;
                response = await fetch(url);
                data = await response.json();
            }

            if (data.error) {
                displayResults(`No side effect records found on file for: "${searchWord.toUpperCase()}".`);
                return;
            }

            let htmlOutput = `<h3>Top Reported Side Effects for: ${searchWord.toUpperCase()}</h3><ul>`;
            data.results.forEach(item => {
                htmlOutput += `<li><strong>${item.term.toLowerCase()}</strong> (Reported in ${item.count} clinical cases)</li>`;
            });
            htmlOutput += `</ul>`;
            displayResults(htmlOutput);

        } catch (err) {
            displayResults("Error retrieving side effects data. Please try again.");
        }
    }

    // BUTTON 2: Fetch Warning Labels / Interactions with Internal text fallback & Web portal fallback
    async function checkInteractions() {
        const rawInput = document.getElementById('med-input').value;
        if (!rawInput) return alert("Please enter a medication name first.");
        
        showLoading();
        const cleanName = await getNormalizedDrugName(rawInput);
        const searchWord = cleanName || rawInput.trim().toLowerCase();

        try {
            let url = `https://api.fda.gov/drug/label.json?search=openfda.generic_name:"${encodeURIComponent(searchWord)}"&limit=1`;
            let response = await fetch(url);
            let data = await response.json();
            
            if (data.error || !data.results || data.results.length === 0) {
                url = `https://api.fda.gov/drug/label.json?search="${encodeURIComponent(searchWord)}"&limit=1`;
                response = await fetch(url);
                data = await response.json();
            }

            if (data.error || !data.results || data.results.length === 0) {
                displayNoResultsLayout(searchWord);
                return;
            }

            const record = data.results[0];
            
            // NEW STRATEGY 1: Internal text property fallback array cascade
            const interactionText = record.drug_interactions ? record.drug_interactions[0] : 
                                    (record.warnings_and_cautions ? record.warnings_and_cautions[0] : 
                                    (record.warnings ? record.warnings[0] : 
                                    (record.description ? record.description[0] : null)));

            if (!interactionText) {
                displayNoResultsLayout(searchWord);
                return;
            }

            const lowerInteractionText = interactionText.toLowerCase();
            let htmlOutput = `<h3>Official FDA Labeling text for: ${searchWord.toUpperCase()}</h3>`;
            
            let matchedMeds = [];
            currentMedications.forEach(med => {
                const regex = new RegExp(`\\b${med.toLowerCase()}\\b`, 'gi');
                if (regex.test(lowerInteractionText)) {
                    matchedMeds.push(med.toUpperCase());
                }
            });

            if (matchedMeds.length > 0) {
                htmlOutput += `<div style="background: #fff3cd; border: 1px solid #ffeeba; padding: 15px; margin-bottom: 15px; border-radius: 4px; color: #856404;">`;
                htmlOutput += `<strong>⚠️ ATTENTION:</strong> Mention of current medication(s) <strong>${matchedMeds.join(', ')}</strong> detected in the safety documentation below.`;
                htmlOutput += `</div>`;
            } else {
                htmlOutput += `<div style="background: #d4edda; border: 1px solid #c3e6cb; padding: 15px; margin-bottom: 15px; border-radius: 4px; color: #155724;">`;
                htmlOutput += `✓ No obvious textual matches found against your current medication list words. Always cross-check details text explicitly below.`;
                htmlOutput += `</div>`;
            }

            htmlOutput += `<p style="font-size: 14px; color: #444; max-height: 400px; overflow-y: scroll; border: 1px solid #ddd; padding: 10px; background: #fafafa;">${interactionText}</p>`;
            displayResults(htmlOutput);

        } catch (err) {
            displayResults("Error retrieving interaction documentation.");
        }
    }

    // NEW STRATEGY 2: Render interactive cross-check alert system with automated portal links
    function displayNoResultsLayout(drugName) {
        const profileQuery = currentMedications.join(" OR ");
        const searchUrl = `https://www.google.com/search?q=${encodeURIComponent(drugName + ' interaction (' + profileQuery + ')')}`;
        
        let htmlFallback = `<h3>No Active Label Logs Found</h3>`;
        htmlFallback += `<div style="background: #f8d7da; border: 1px solid #f5c6cb; padding: 15px; border-radius: 4px; color: #721c24;">`;
        htmlFallback += `The automated openFDA pipeline lacks a structured warning label log file for <strong>${drugName.toUpperCase()}</strong>.`;
        htmlFallback += `<br><br><strong>Alternative Verification Option:</strong> Use the lookup link below to instantly check search engine indexes and medical databases for active warnings matching your current drug list profile.`;
        htmlFallback += `<br><button class="btn-search" onclick="window.open('${searchUrl}', '_blank')">🔍 Launch Web Interaction Cross-Check</button>`;
        htmlFallback += `</div>`;
        
        displayResults(htmlFallback);
    }

    function showLoading() {
        resultsDiv.style.display = 'block';
        resultsDiv.innerHTML = '<span class="loading">Searching medical registries...</span>';
    }

    function displayResults(content) {
        resultsDiv.innerHTML = content;
    }
</script>

</body>
</html>
